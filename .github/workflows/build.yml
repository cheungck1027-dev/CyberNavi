name: ⚡ CyberNavi Thunder – Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 允許手動觸發

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 獲取代碼 ─────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. 設置 JDK 17 ───────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. 設置 Android SDK ────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. 賦予 gradlew 執行權限 ──────────────────────
      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. 修復 Gradle Wrapper JAR（重新下載以防損壞）──
      - name: 🔧 Fix Gradle Wrapper JAR
        run: |
          GRADLE_VERSION=$(grep 'distributionUrl' gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\([0-9.]*\)-.*/\1/')
          echo "Target Gradle version: ${GRADLE_VERSION}"
          curl -sLo gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Fallback: downloading v8.7.0 wrapper JAR"
            curl -sLo gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          echo "Wrapper JAR: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      # ── 6. 緩存 Gradle 依賴（加速後續構建）───────────────
      - name: 💾 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. 構建 Debug APK ──────────────────────────────
      - name: 🔨 Build Debug APK
        run: |
          unset JAVA_OPTS GRADLE_OPTS _JAVA_OPTIONS JDK_JAVA_OPTIONS
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_OPTS: ""
          GRADLE_OPTS: ""

      # ── 8. 上傳 APK Artifact ───────────────────────────
      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberNavi-Thunder-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
